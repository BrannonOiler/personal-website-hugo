## BASE CONFIGURATION
baseURL = 'https://brannonoiler.com/'
title = 'Brannon Oiler'
theme = "hugo-coder"
languageCode = 'en-us'
defaultcontentlanguage = "en"

#? Enable HTML in MD files (figures, tables, etc.)
[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

## HUGO-CODER THEME
[deployment]
[[deployment.targets]]
name = 'production'
url = 's3://brannonoiler.com?region=us-east-2'

[pagination]
pagerSize = 20

# [services]
# [services.disqus]
# shortname = "brannonoiler"

[markup.highlight]
style = "github-dark"

[params]
author = "Brannon Oiler"
info = "Full Stack Application Developer"
description = "Brannon Oiler's personal website"
keywords = "blog,developer,personal"
avatarurl = "img/avatar.jpg"

faviconSVG = "/img/favicon.png"
favicon_32 = "/img/favicon-32.png"
favicon_16 = "/img/favicon-16.png"

since = 2026

enableTwemoji = true

colorScheme = "auto"
hidecolorschemetoggle = false

customCSS = ["css/custom.css"]
# customSCSS = ["scss/custom.scss"]
# customJS = ["js/custom.js"]

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

# Social links
[[params.social]]
name = "Github"
icon = "fa-brands fa-github fa-2x"
weight = 1
url = "https://github.com/brannonoiler/"
[[params.social]]
name = "LinkedIn"
icon = "fa-brands fa-linkedin fa-2x"
weight = 2
url = "https://www.linkedin.com/in/brannonoiler/"
# [[params.social]]
# name = "Twitter"
# icon = "fa-brands fa-x-twitter fa-2x"
# weight = 3
# url = "https://twitter.com/brannonoiler/"

# Menu links
[[menu.main]]
name = "Blog"
weight = 1
url = "posts/"
[[menu.main]]
name = "About"
weight = 2
url = "about/"
